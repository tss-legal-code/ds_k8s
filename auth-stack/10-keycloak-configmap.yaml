apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: auth
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  dev-realm.json: |
    {
      "realm": "dev",
      "enabled": true,
      "clients": [
        {
          "clientId": "react-frontend",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": true,
          "redirectUris": ["http://localhost:5555/*"],
          "webOrigins": ["*"]
        }
      ],
      "users": [
        {
          "username": "alice",
          "enabled": true,
          "firstName": "Alice",
          "lastName": "Smith",
          "email": "alice@example.com",
          "credentials": [
            {
              "type": "password",
              "value": "password123",
              "temporary": false
            }
          ]
        }
      ]
    }