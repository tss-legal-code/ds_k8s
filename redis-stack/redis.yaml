apiVersion: v1
kind: Namespace
metadata:
  name: cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cache
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cache
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
# =========================
# Redis Insight UI
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-insight
  namespace: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-insight
  template:
    metadata:
      labels:
        app: redis-insight
    spec:
      containers:
        - name: redis-insight
          image: redis/redisinsight:latest
          ports:
            - containerPort: 5540
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-insight-service
  namespace: cache
spec:
  type: NodePort
  selector:
    app: redis-insight
  ports:
    - protocol: TCP
      port: 5540
      targetPort: 5540
      nodePort: 30540